  <script src="https://eeg1412.github.io/wikimoeBlogArchive/glightbox/glightbox.min.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.post-content img, .tweet-media-item').forEach(function(img) {
      if (img.closest('a')) return;
      var href = img.getAttribute('data-href') || img.src;
      if (!href) return;
      var a = document.createElement('a');
      a.href = href;
      a.className = 'glightbox';
      img.parentNode.insertBefore(a, img);
      a.appendChild(img);
    });
    document.querySelectorAll('.post-content video').forEach(function(video) {
      if (video.closest('a')) return;
      var sourceEl = video.querySelector('source');
      var src = video.getAttribute('src') || (sourceEl && sourceEl.getAttribute('src'));
      if (!src) return;
      var a = document.createElement('a');
      a.href = src;
      a.className = 'glightbox';
      a.setAttribute('data-type', 'video');
      video.parentNode.insertBefore(a, video);
      a.appendChild(video);
    });
    GLightbox({ selector: '.glightbox' });
  });
  </script>
