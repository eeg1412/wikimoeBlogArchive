      <p class="post-excerpt">2024年4月28日，天气晴，今天去探访《蜡笔小新》的老家——春日部。
《蜡笔小新》可能是很多大佬的童年回忆，那么《蜡笔小新》实际的取景地是哪里呢？根据资料，就是位于日本埼玉县春日部。
这次就趁着春日部一年一度的紫藤节，特地探访了《蜡笔小新》的老家——春日部。</p>

  <script>
  document.addEventListener('DOMContentLoaded', function() {
    // 导航下拉菜单：点击触发器展开，点击外部关闭
    var dropdowns = document.querySelectorAll('.nav-dropdown');
    dropdowns.forEach(function(dropdown) {
      var trigger = dropdown.querySelector('.nav-dropdown-trigger');
      if (trigger) {
        trigger.addEventListener('click', function(e) {
          e.stopPropagation();
          dropdown.classList.toggle('open');
        });
      }
    });
    document.addEventListener('click', function() {
      dropdowns.forEach(function(d) { d.classList.remove('open'); });
    });
    document.querySelectorAll('.nav-dropdown-menu').forEach(function(menu) {
      menu.addEventListener('click', function(e) { e.stopPropagation(); });
    });
    document.querySelectorAll('.rich-content img').forEach(function(img) {
      if (img.closest('a')) return;
      var href = img.getAttribute('data-href') || img.src;
      if (!href) return;
      var a = document.createElement('a');
      a.href = href;
      a.className = 'glightbox';
      img.parentNode.insertBefore(a, img);
      a.appendChild(img);
    });
    document.querySelectorAll('.rich-content video').forEach(function(video) {
      if (video.closest('a')) return;
      var sourceEl = video.querySelector('source');
      var src = video.getAttribute('src') || (sourceEl && sourceEl.getAttribute('src'));
      if (!src) return;
      var a = document.createElement('a');
      a.href = src;
      a.className = 'glightbox';
      a.setAttribute('data-type', 'video');
      video.parentNode.insertBefore(a, video);
      a.appendChild(video);
    });
    GLightbox({ selector: '.glightbox' });
    document.querySelectorAll('.post-card[data-href]').forEach(function(card) {
      card.addEventListener('click', function(e) {
        if (e.target.closest('a')) return;
        window.location.href = card.dataset.href;
      });
    });
  });
  </script>
