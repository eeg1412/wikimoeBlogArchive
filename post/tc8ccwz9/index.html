  <div class="lightbox-overlay" id="lightbox"><img id="lightbox-img" alt=""></div>
  <script>
  (function(){
    var overlay = document.getElementById('lightbox');
    var lbImg = document.getElementById('lightbox-img');
    document.addEventListener('click', function(e) {
      var img = e.target.closest('img[data-href], .post-content img');
      if (!img || overlay.contains(img)) return;
      var full = img.getAttribute('data-href') || img.src;
      lbImg.src = full;
      overlay.classList.add('active');
    });
    overlay.addEventListener('click', function() {
      overlay.classList.remove('active');
      lbImg.src = '';
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') { overlay.classList.remove('active'); lbImg.src = ''; }
    });
  })();
